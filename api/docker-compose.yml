# docker-compose for local/deploy: PostgreSQL + the backend API.
#   docker compose up --build
# The API waits for Postgres to be healthy, runs migrations on boot, then serves.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
      POSTGRES_DB: ${PGDATABASE:-stocks}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${PGUSER:-postgres} -d ${PGDATABASE:-stocks}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      PGHOST: db
      PGPORT: 5432
      PGUSER: ${PGUSER:-postgres}
      PGPASSWORD: ${PGPASSWORD:-postgres}
      PGDATABASE: ${PGDATABASE:-stocks}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FINNHUB_BASE_URL: ${FINNHUB_BASE_URL:-https://finnhub.io/api/v1}
      FINNHUB_API_KEY: ${FINNHUB_API_KEY:-}
      FIREBASE_SERVICE_ACCOUNT: ${FIREBASE_SERVICE_ACCOUNT:-}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-15000}
      ALERT_WORKER_ENABLED: ${ALERT_WORKER_ENABLED:-true}
    ports:
      - '3000:3000'

volumes:
  pgdata:
