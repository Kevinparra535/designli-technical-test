# docker-compose para DESARROLLO — solo PostgreSQL (estilo guía de Notion).
# El backend Node corre en el host (`npm run dev`) y se conecta a este contenedor.
#
#   docker compose up -d        # inicia la base de datos
#   docker compose ps           # lista los contenedores activos
#   docker compose down         # detiene (los datos persisten en el volumen)
#
# Las credenciales por defecto coinciden con los valores de env.ts, así que
# `npm run dev` conecta sin configurar nada (PGHOST=localhost).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PGDATABASE:-stocks}
      POSTGRES_USER: ${PGUSER:-postgres}
      POSTGRES_PASSWORD: ${PGPASSWORD:-postgres}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
